# alembic.ini
# Configuración de Alembic para migraciones de SQLite + WAL mode.
#
# NOTA IMPORTANTE:
#   sqlalchemy.url NO se configura aquí — se lee de .env via get_settings()
#   en alembic/env.py. Esto garantiza que dev y prod usan el URL correcto.
#
# Comandos:
#   uv run alembic upgrade head           → aplica migraciones pendientes
#   uv run alembic revision --autogenerate -m "add_col"  → genera migración
#   uv run alembic downgrade -1           → revierte última migración
#   uv run alembic current                → versión actual de la DB
#   uv run alembic history                → historial de migraciones

[alembic]
# Directorio donde viven env.py y versions/
script_location = alembic

# Formato del nombre de archivo de migraciones generadas:
# Ejemplo: 20260507_1530_a1b2c3d4_add_property_hash.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Añade el directorio raíz del proyecto al sys.path
# Necesario para que alembic/env.py pueda importar app.core.config
prepend_sys_path = .

# Longitud máxima del slug en el nombre del archivo
truncate_slug_length = 40

# timezone para Create Date en las migraciones
timezone = UTC

# sqlalchemy.url — configurado programáticamente en alembic/env.py
# No establecer aquí. Dejar comentado.
# sqlalchemy.url =


# ── Post-write hooks ──────────────────────────────────────────────
# Formatea las migraciones generadas con ruff si está disponible
# Descomenta para activar:
# [post_write_hooks]
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# ── Logging ───────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level    = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level    = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level    = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format   = %(levelname)-5.5s [%(name)s] %(message)s
datefmt  = %H:%M:%S
