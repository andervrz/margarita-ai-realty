<!-- demo/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo — Margarita AI Realty Chatbot</title>
    <style>
        /* ── Reset & Base ────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ── Chat Container ──────────────────────────────────────── */
        .demo-container {
            width: 100%;
            max-width: 420px;
            height: 80vh;
            min-height: 600px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ──────────────────────────────────────────────── */
        .chat-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        .status-dot.disconnected { background: #ef4444; animation: none; }
        .status-dot.connecting   { background: #f59e0b; animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        /* ── Messages ────────────────────────────────────────────── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8fafc;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9375rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user  {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message.error {
            align-self: center;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            font-size: 0.875rem;
        }

        .message.system {
            align-self: center;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            font-size: 0.8125rem;
            max-width: 90%;
        }

        /* ── Typing Indicator ────────────────────────────────────── */
        .message.typing { align-self: flex-start; background: white; padding: 16px 20px; }

        .typing-dots { display: flex; gap: 6px; }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40%           { transform: scale(1); }
        }

        /* ── Property Cards ──────────────────────────────────────── */
        .property-cards { display: flex; flex-direction: column; gap: 10px; }

        .property-card {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        .property-card h4 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .property-card .price {
            font-size: 0.875rem;
            color: #059669;
            font-weight: 600;
        }

        .property-card .tags {
            font-size: 0.8125rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* ── Quick Replies ───────────────────────────────────────── */
        .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; }

        .quick-reply {
            background: #eff6ff;
            color: #3b82f6;
            border: 1px solid #bfdbfe;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:hover { background: #3b82f6; color: white; }

        /* ── Booking Stage ───────────────────────────────────────── */
        .booking-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-bottom: 6px;
        }

        /* ── Input ───────────────────────────────────────────────── */
        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus    { border-color: #3b82f6; }
        .input-area input:disabled { background: #f1f5f9; cursor: not-allowed; }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .input-area button:hover:not(:disabled) { background: #2563eb; }
        .input-area button:disabled { background: #94a3b8; cursor: not-allowed; }

        /* ── Footer ──────────────────────────────────────────────── */
        .session-info {
            padding: 8px 20px;
            background: #f1f5f9;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }

        .session-info a { color: #3b82f6; text-decoration: none; }
        .session-info a:hover { text-decoration: underline; }

        /* ── Scrollbar ───────────────────────────────────────────── */
        .messages-area::-webkit-scrollbar       { width: 6px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="demo-container">

    <!-- Header -->
    <div class="chat-header">
        <h1>🏝️ Margarita AI Realty</h1>
        <p>Tu asistente inmobiliario en la Perla del Caribe</p>
        <div class="status-indicator">
            <span class="status-dot connecting" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea"></div>

    <!-- Input -->
    <div class="input-area">
        <input
            type="text"
            id="messageInput"
            placeholder="Escribe tu mensaje..."
            autocomplete="off"
            disabled
        >
        <button id="sendButton" disabled aria-label="Enviar mensaje">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <!-- Footer -->
    <div class="session-info">
        Session: <span id="sessionId">—</span> |
        <a href="#" id="newSessionLink">Nueva sesión</a>
    </div>

</div>

<script>
// ── Configuración ─────────────────────────────────────────────────
// Ajusta WS_HOST y API_HOST si el servidor corre en otro puerto u host
const CONFIG = {
    WS_HOST:              'ws://localhost:8000',
    API_HOST:             'http://localhost:8000',
    // Rutas según router setup:
    //   chat.router sin prefix, montado en api_v1_router → /api/v1
    //   WebSocket: /api/v1/ws/chat/{session_id}
    //   POST:      /api/v1
    WS_PATH:              '/api/v1/ws/chat/',
    API_PATH:             '/api/v1',
    RECONNECT_DELAY_MS:   3000,
    MAX_RECONNECT:        5,
    STORAGE_KEY:          'margarita_realty_session_id',
};

// ── Estado ────────────────────────────────────────────────────────
let ws                = null;
let sessionId         = localStorage.getItem(CONFIG.STORAGE_KEY) || generateSessionId();
let reconnectAttempts = 0;
let isConnecting      = false;

// ── DOM ───────────────────────────────────────────────────────────
const messagesArea  = document.getElementById('messagesArea');
const messageInput  = document.getElementById('messageInput');
const sendButton    = document.getElementById('sendButton');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');
const sessionIdSpan = document.getElementById('sessionId');
const newSessionLink= document.getElementById('newSessionLink');

// Mostrar session ID truncado
sessionIdSpan.textContent = sessionId.substring(0, 8) + '…';

// ── Helpers ───────────────────────────────────────────────────────

/** Genera UUID v4 usando la Web Crypto API (disponible en todos los browsers modernos). */
function generateSessionId() {
    const id = crypto.randomUUID();
    localStorage.setItem(CONFIG.STORAGE_KEY, id);
    return id;
}

function escapeHtml(text) {
    const el = document.createElement('div');
    el.textContent = String(text ?? '');
    return el.innerHTML;
}

function scrollToBottom() {
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

function updateStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
}

function enableInput(enabled) {
    messageInput.disabled = !enabled;
    sendButton.disabled   = !enabled;
    if (enabled) messageInput.focus();
}

// ── WebSocket ─────────────────────────────────────────────────────

function connect() {
    if (isConnecting || (ws && ws.readyState === WebSocket.OPEN)) return;

    isConnecting = true;
    updateStatus('connecting', 'Conectando...');

    const url = CONFIG.WS_HOST + CONFIG.WS_PATH + sessionId;
    ws = new WebSocket(url);

    ws.onopen = () => {
        console.log('[WS] Conectado:', url);
        isConnecting      = false;
        reconnectAttempts = 0;
        updateStatus('connected', 'En línea');
        enableInput(true);
    };

    ws.onmessage = (event) => {
        try {
            handleServerMessage(JSON.parse(event.data));
        } catch (err) {
            console.error('[WS] Error parseando mensaje:', err);
        }
    };

    ws.onclose = (event) => {
        console.log('[WS] Cerrado. Código:', event.code);
        isConnecting = false;
        enableInput(false);

        if (reconnectAttempts < CONFIG.MAX_RECONNECT) {
            reconnectAttempts++;
            const attempt = `${reconnectAttempts}/${CONFIG.MAX_RECONNECT}`;
            updateStatus('connecting', `Reconectando (${attempt})…`);
            setTimeout(connect, CONFIG.RECONNECT_DELAY_MS);
        } else {
            updateStatus('disconnected', 'Sin conexión — usando modo HTTP');
            enableInput(true);  // POST fallback sigue disponible
            addSystemMessage('⚠️ WebSocket desconectado. Los mensajes se enviarán por HTTP.');
        }
    };

    ws.onerror = (err) => {
        console.error('[WS] Error:', err);
        isConnecting = false;
    };
}

// ── Manejar mensajes del servidor ─────────────────────────────────

function handleServerMessage(data) {
    // Responder ping del servidor con pong — mantiene la conexión viva
    if (data.type === 'ping') {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'pong' }));
        }
        return;  // No mostrar nada al usuario
    }

    removeTypingIndicator();

    if (data.type === 'error') {
        addMessage(data.content || 'Error desconocido.', 'error');
        return;
    }

    // Texto principal del bot
    if (data.content) {
        const div = addMessage(data.content, 'bot');

        // Badge de booking si está activo
        if (data.is_booking_active && data.booking_step) {
            const badge = document.createElement('div');
            badge.className = 'booking-badge';
            badge.textContent = `📋 Paso: ${data.booking_step}`;
            div.prepend(badge);
        }
    }

    // Cards de propiedades
    if (Array.isArray(data.properties) && data.properties.length > 0) {
        addPropertyCards(data.properties);
    }

    // Quick replies / sugerencias
    if (Array.isArray(data.suggestions) && data.suggestions.length > 0) {
        addQuickReplies(data.suggestions);
    }

    // Debug en console (no en UI)
    if (data.qualification_score !== undefined) {
        console.log('[Qualifier] score:', data.qualification_score,
                    '| stage:', data.qualification_stage,
                    '| lang:', data.language);
    }
}

// ── Construir UI ──────────────────────────────────────────────────

function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;
    messagesArea.appendChild(div);
    scrollToBottom();
    return div;
}

function addSystemMessage(text) {
    const div = document.createElement('div');
    div.className = 'message system';
    div.textContent = text;
    messagesArea.appendChild(div);
    scrollToBottom();
}

function addPropertyCards(properties) {
    const cards = document.createElement('div');
    cards.className = 'property-cards';

    properties.forEach(prop => {
        const card = document.createElement('div');
        card.className = 'property-card';

        const price = prop.price_usd
            ? `$${Number(prop.price_usd).toLocaleString('es-VE')} USD`
            : 'Precio: consultar';

        const flags = [
            prop.vista_al_mar  ? '🌊 Vista al mar'    : '',
            prop.frente_playa  ? '🏖️ Frente playa'   : '',
            prop.uso_vacacional? '💰 Vacacional'       : '',
        ].filter(Boolean).join(' · ');

        card.innerHTML = `
            <h4>${escapeHtml(prop.title || 'Propiedad')}</h4>
            <div class="price">${price}</div>
            <div class="tags">
                ${escapeHtml(prop.location_zone || '')}
                ${prop.bedrooms  ? `· ${prop.bedrooms}H` : ''}
                ${prop.bathrooms ? `/${prop.bathrooms}B` : ''}
                ${prop.area_m2   ? `· ${prop.area_m2}m²` : ''}
                ${flags          ? `· ${flags}` : ''}
            </div>
        `;
        cards.appendChild(card);
    });

    const wrapper = document.createElement('div');
    wrapper.className = 'message bot';
    wrapper.style.padding = '12px';
    wrapper.appendChild(cards);
    messagesArea.appendChild(wrapper);
    scrollToBottom();
}

function addQuickReplies(suggestions) {
    const container = document.createElement('div');
    container.className = 'quick-replies';

    suggestions.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'quick-reply';
        btn.textContent = text;
        btn.addEventListener('click', () => {
            // Eliminar los quick replies al seleccionar uno
            container.closest('.message')?.remove();
            sendMessage(text);
        });
        container.appendChild(btn);
    });

    const wrapper = document.createElement('div');
    wrapper.className = 'message bot';
    wrapper.style.cssText = 'background:transparent;box-shadow:none;padding:4px 0;';
    wrapper.appendChild(container);
    messagesArea.appendChild(wrapper);
    scrollToBottom();
}

function showTypingIndicator() {
    removeTypingIndicator();
    const div = document.createElement('div');
    div.className = 'message typing';
    div.id = 'typingIndicator';
    div.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    messagesArea.appendChild(div);
    scrollToBottom();
}

function removeTypingIndicator() {
    document.getElementById('typingIndicator')?.remove();
}

// ── Enviar mensaje ────────────────────────────────────────────────

function sendMessage(text) {
    const trimmed = text.trim();
    if (!trimmed) return;

    addMessage(trimmed, 'user');
    messageInput.value = '';
    showTypingIndicator();

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ message: trimmed }));
    } else {
        // Fallback HTTP cuando WebSocket no está disponible
        sendViaHttp(trimmed);
    }
}

async function sendViaHttp(text) {
    try {
        const response = await fetch(CONFIG.API_HOST + CONFIG.API_PATH, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Session-Id': sessionId,
                'X-API-Key':    'dev',  // DEV_TENANT en development
            },
            body: JSON.stringify({ message: text }),
        });

        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.detail || `HTTP ${response.status}`);
        }

        handleServerMessage(await response.json());

    } catch (err) {
        console.error('[HTTP] Fallback failed:', err);
        removeTypingIndicator();
        addMessage(`Error: ${err.message}`, 'error');
    }
}

// ── Event Listeners ───────────────────────────────────────────────

sendButton.addEventListener('click', () => sendMessage(messageInput.value));

messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(messageInput.value);
    }
});

newSessionLink.addEventListener('click', (e) => {
    e.preventDefault();
    sessionId = generateSessionId();
    sessionIdSpan.textContent = sessionId.substring(0, 8) + '…';
    messagesArea.innerHTML = '';
    reconnectAttempts = 0;
    if (ws) ws.close();
    connect();
    addSystemMessage('✅ Nueva sesión iniciada.');
});

// ── Init ──────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
