
<!-- project/demo/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo — Margarita AI Realty Chatbot</title>
    <style>
        /* ── Reset & Base ─────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ── Demo Container ────────────────────────────────────────── */
        .demo-container {
            width: 100%;
            max-width: 420px;
            height: 80vh;
            min-height: 600px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ────────────────────────────────────────────────── */
        .chat-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Messages Area ─────────────────────────────────────────── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8fafc;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9375rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .message.error {
            align-self: center;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            font-size: 0.875rem;
        }

        .message.typing {
            align-self: flex-start;
            background: white;
            padding: 16px 20px;
        }

        .typing-dots {
            display: flex;
            gap: 6px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ── Properties Cards ──────────────────────────────────────── */
        .property-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .property-card {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        .property-card h4 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .property-card .price {
            font-size: 0.875rem;
            color: #059669;
            font-weight: 600;
        }

        .property-card .details {
            font-size: 0.8125rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* ── Quick Replies ─────────────────────────────────────────── */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-reply {
            background: #eff6ff;
            color: #3b82f6;
            border: 1px solid #bfdbfe;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #3b82f6;
            color: white;
        }

        /* ── Input Area ────────────────────────────────────────────── */
        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #3b82f6;
        }

        .input-area input:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .input-area button:hover:not(:disabled) {
            background: #2563eb;
        }

        .input-area button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* ── Session Info ──────────────────────────────────────────── */
        .session-info {
            padding: 8px 20px;
            background: #f1f5f9;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }

        /* ── Scrollbar ─────────────────────────────────────────────── */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <!-- Header -->
        <div class="chat-header">
            <h1>🏝️ Margarita AI Realty</h1>
            <p>Tu asistente inmobiliario en la Perla del Caribe</p>
            <div class="status-indicator">
                <span class="status-dot connecting" id="statusDot"></span>
                <span id="statusText">Conectando...</span>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="messagesArea">
            <!-- Los mensajes se insertan aquí dinámicamente -->
        </div>

        <!-- Input -->
        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Escribe tu mensaje..."
                autocomplete="off"
                disabled
            >
            <button id="sendButton" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <!-- Session Info -->
        <div class="session-info">
            Session ID: <span id="sessionId">—</span> | 
            <a href="#" id="newSessionLink">Nueva sesión</a>
        </div>
    </div>

    <script>
        // ── Configuración ───────────────────────────────────────────
        const CONFIG = {
            WS_URL: 'ws://localhost:8000/ws/chat/',
            API_URL: 'http://localhost:8000/api/v1/chat',
            HEARTBEAT_INTERVAL: 30000,  // 30s
            RECONNECT_DELAY: 3000,      // 3s
            MAX_RECONNECT_ATTEMPTS: 5,
        };

        // ── Estado ────────────────────────────────────────────────────
        let ws = null;
        let sessionId = localStorage.getItem('chat_session_id') || generateSessionId();
        let reconnectAttempts = 0;
        let heartbeatInterval = null;
        let isConnecting = false;

        // ── DOM Elements ─────────────────────────────────────────────
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const sessionIdSpan = document.getElementById('sessionId');
        const newSessionLink = document.getElementById('newSessionLink');

        // ── Session ID ────────────────────────────────────────────────
        sessionIdSpan.textContent = sessionId.substring(0, 8) + '...';

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substring(2, 15) + 
                   Math.random().toString(36).substring(2, 15);
        }

        // ── WebSocket Connection ────────────────────────────────────
        function connect() {
            if (isConnecting || (ws && ws.readyState === WebSocket.OPEN)) return;
            
            isConnecting = true;
            updateStatus('connecting', 'Conectando...');

            ws = new WebSocket(CONFIG.WS_URL + sessionId);

            ws.onopen = () => {
                console.log('WebSocket connected');
                isConnecting = false;
                reconnectAttempts = 0;
                updateStatus('connected', 'En línea');
                enableInput(true);
                startHeartbeat();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (err) {
                    console.error('Error parsing message:', err);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                isConnecting = false;
                stopHeartbeat();
                enableInput(false);
                
                if (reconnectAttempts < CONFIG.MAX_RECONNECT_ATTEMPTS) {
                    updateStatus('connecting', `Reconectando (${reconnectAttempts + 1}/${CONFIG.MAX_RECONNECT_ATTEMPTS})...`);
                    reconnectAttempts++;
                    setTimeout(connect, CONFIG.RECONNECT_DELAY);
                } else {
                    updateStatus('disconnected', 'Desconectado. Recarga la página.');
                    // Fallback a POST
                    enableInput(true);
                }
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                isConnecting = false;
            };
        }

        // ── Heartbeat ─────────────────────────────────────────────────
        function startHeartbeat() {
            heartbeatInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'pong' }));
                }
            }, CONFIG.HEARTBEAT_INTERVAL);
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
        }

        // ── Message Handling ────────────────────────────────────────
        function handleMessage(data) {
            // Responder a pings del servidor
            if (data.type === 'ping') {
                ws.send(JSON.stringify({ type: 'pong' }));
                return;
            }

            removeTypingIndicator();

            if (data.type === 'error') {
                addMessage(data.content, 'error');
                return;
            }

            // Mensaje normal del bot
            addMessage(data.content, 'bot');

            // Mostrar propiedades si vienen
            if (data.properties && data.properties.length > 0) {
                addPropertyCards(data.properties);
            }

            // Mostrar quick replies si vienen
            if (data.suggestions && data.suggestions.length > 0) {
                addQuickReplies(data.suggestions);
            }

            // Actualizar score si viene
            if (data.qualification_score !== undefined) {
                console.log('Qualification score:', data.qualification_score);
            }
        }

        // ── UI Functions ──────────────────────────────────────────────
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesArea.appendChild(div);
            scrollToBottom();
        }

        function addPropertyCards(properties) {
            const container = document.createElement('div');
            container.className = 'property-cards';
            
            properties.forEach(prop => {
                const card = document.createElement('div');
                card.className = 'property-card';
                card.innerHTML = `
                    <h4>${escapeHtml(prop.title || 'Propiedad')}</h4>
                    <div class="price">$${(prop.price_usd || 0).toLocaleString()} USD</div>
                    <div class="details">
                        ${prop.location_zone || ''} · 
                        ${prop.bedrooms || '-'} hab · 
                        ${prop.bathrooms || '-'} baños · 
                        ${prop.area_m2 || '-'} m²
                        ${prop.vista_al_mar ? '· 🌊 Vista al mar' : ''}
                    </div>
                `;
                container.appendChild(card);
            });

            const wrapper = document.createElement('div');
            wrapper.className = 'message bot';
            wrapper.appendChild(container);
            messagesArea.appendChild(wrapper);
            scrollToBottom();
        }

        function addQuickReplies(suggestions) {
            const container = document.createElement('div');
            container.className = 'quick-replies';
            
            suggestions.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'quick-reply';
                btn.textContent = text;
                btn.onclick = () => sendMessage(text);
                container.appendChild(btn);
            });

            const wrapper = document.createElement('div');
            wrapper.className = 'message bot';
            wrapper.style.background = 'transparent';
            wrapper.style.boxShadow = 'none';
            wrapper.style.padding = '0';
            wrapper.appendChild(container);
            messagesArea.appendChild(wrapper);
            scrollToBottom();
        }

        function showTypingIndicator() {
            removeTypingIndicator();
            const div = document.createElement('div');
            div.className = 'message typing';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesArea.appendChild(div);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function updateStatus(state, text) {
            statusDot.className = 'status-dot ' + state;
            statusText.textContent = text;
        }

        function enableInput(enabled) {
            messageInput.disabled = !enabled;
            sendButton.disabled = !enabled;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── Send Message ──────────────────────────────────────────────
        function sendMessage(text) {
            if (!text.trim()) return;

            addMessage(text, 'user');
            messageInput.value = '';
            showTypingIndicator();

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ message: text }));
            } else {
                // Fallback a POST
                sendViaHttp(text);
            }
        }

        async function sendViaHttp(text) {
            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId,
                        'X-API-Key': 'dev',
                    },
                    body: JSON.stringify({ message: text }),
                });

                if (!response.ok) throw new Error('HTTP ' + response.status);

                const data = await response.json();
                handleMessage(data);
            } catch (err) {
                console.error('POST fallback failed:', err);
                removeTypingIndicator();
                addMessage('Error de conexión. Intenta de nuevo.', 'error');
            }
        }

        // ── Event Listeners ───────────────────────────────────────────
        sendButton.addEventListener('click', () => {
            sendMessage(messageInput.value);
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage(messageInput.value);
            }
        });

        newSessionLink.addEventListener('click', (e) => {
            e.preventDefault();
            sessionId = generateSessionId();
            localStorage.setItem('chat_session_id', sessionId);
            sessionIdSpan.textContent = sessionId.substring(0, 8) + '...';
            messagesArea.innerHTML = '';
            if (ws) ws.close();
            connect();
        });

        // ── Init ──────────────────────────────────────────────────────
        connect();
    </script>
</body>
</html>
